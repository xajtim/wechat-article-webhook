<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公众号文章活码管理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f6f7;
      margin: 0;
      padding: 20px;
      color: #1a1a1a;
    }
    .container {
      max-width: 520px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border .2s;
    }
    input[type="text"]:focus {
      border-color: #07c160;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #06ad56; }
    button:disabled { background: #a9e6c1; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .result.success { background: #e8f8ef; border: 1px solid #b7ebd0; display: block; }
    .result.error { background: #fef0f0; border: 1px solid #f9d2d2; display: block; }
    .result-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .result.success .result-title { color: #07c160; }
    .result.error .result-title { color: #d93025; }
    .result-row {
      font-size: 13px;
      margin: 6px 0;
      word-break: break-all;
    }
    .result-row a {
      color: #576b95;
      text-decoration: none;
    }
    .steps {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .steps h3 {
      font-size: 14px;
      margin: 0 0 10px 0;
    }
    .steps ol {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 6px;
    }
    .badge.warn { background: #fff3e0; color: #ef6c00; }
  </style>
</head>
<body>
  <div class="container">
    <h1>公众号文章活码管理</h1>
    <div class="subtitle">在发布文章前，自动生成企微活码并写入“阅读原文”</div>

    <div class="form-group">
      <label>图文素材 MediaId <span class="badge warn">必填</span></label>
      <input type="text" id="mediaId" placeholder="请输入永久图文素材的 media_id" />
      <div class="hint">可在公众号后台“素材管理”中查看，或通过接口获取</div>
    </div>

    <div class="form-group">
      <label>文章标题 <span class="badge" style="background:#f0f0f0;color:#666;">可选</span></label>
      <input type="text" id="title" placeholder="留空将自动从素材中读取" />
    </div>

    <button id="btn" onclick="handleProcess()">生成活码并更新阅读原文</button>

    <div id="result" class="result">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultBody"></div>
    </div>

    <div class="steps">
      <h3>使用步骤</h3>
      <ol>
        <li>在公众号后台创建好永久图文素材，复制其 <b>media_id</b></li>
        <li>将 media_id 填入上方输入框，点击按钮</li>
        <li>系统会自动生成企微活码，并写入该素材的“阅读原文”链接</li>
        <li>返回公众号后台，找到该素材并<b>发布/群发</b></li>
        <li>发布后用户点击“阅读原文”即可跳转到企微活码</li>
      </ol>
    </div>
  </div>

  <script>
    async function handleProcess() {
      const mediaId = document.getElementById('mediaId').value.trim();
      const title = document.getElementById('title').value.trim();
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const resultTitle = document.getElementById('resultTitle');
      const resultBody = document.getElementById('resultBody');

      if (!mediaId) {
        alert('请输入 media_id');
        return;
      }

      btn.disabled = true;
      btn.textContent = '处理中，请稍候...';
      result.className = 'result';
      resultBody.innerHTML = '';

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ media_id: mediaId, title: title || undefined })
        });
        const data = await res.json();

        if (data.success) {
          result.className = 'result success';
          resultTitle.textContent = '✅ 处理成功';
          resultBody.innerHTML = `
            <div class="result-row"><b>标题：</b>${escapeHtml(data.data.title)}</div>
            <div class="result-row"><b>MediaId：</b>${escapeHtml(data.data.media_id)}</div>
            <div class="result-row"><b>活码链接：</b><a href="${escapeHtml(data.data.qrcode_url)}" target="_blank">${escapeHtml(data.data.qrcode_url)}</a></div>
            <div class="result-row" style="margin-top:8px;color:#666;">现在可以前往公众号后台发布该素材了。</div>
          `;
        } else {
          result.className = 'result error';
          resultTitle.textContent = '❌ 处理失败';
          resultBody.innerHTML = `<div class="result-row">${escapeHtml(data.message || '未知错误')}</div>`;
        }
      } catch (err) {
        result.className = 'result error';
        resultTitle.textContent = '❌ 请求失败';
        resultBody.innerHTML = `<div class="result-row">${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '生成活码并更新阅读原文';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
