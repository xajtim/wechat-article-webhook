<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公众号文章活码管理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f6f7;
      margin: 0;
      padding: 20px;
      color: #1a1a1a;
    }
    .container {
      max-width: 640px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 8px 0;
      text-align: center;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 24px 0 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border .2s;
    }
    input[type="text"]:focus {
      border-color: #07c160;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #07c160;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #06ad56; }
    button:disabled { background: #a9e6c1; cursor: not-allowed; }
    button.secondary {
      background: #f2f2f2;
      color: #333;
      font-size: 13px;
      padding: 8px 12px;
      width: auto;
    }
    button.secondary:hover { background: #e6e6e6; }
    button.secondary:disabled { background: #f7f7f7; color: #999; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .result.success { background: #e8f8ef; border: 1px solid #b7ebd0; display: block; }
    .result.error { background: #fef0f0; border: 1px solid #f9d2d2; display: block; }
    .result-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .result.success .result-title { color: #07c160; }
    .result.error .result-title { color: #d93025; }
    .result-row {
      font-size: 13px;
      margin: 6px 0;
      word-break: break-all;
    }
    .result-row a {
      color: #576b95;
      text-decoration: none;
    }

    /* 草稿列表 */
    .drafts-box {
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
    }
    .drafts-empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }
    .draft-item {
      padding: 12px 14px;
      border-bottom: 1px solid #f2f2f2;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .draft-item:last-child { border-bottom: none; }
    .draft-item:hover { background: #f9f9f9; }
    .draft-main {
      flex: 1;
      min-width: 0;
    }
    .draft-title {
      font-size: 14px;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .draft-meta {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .draft-status {
      flex-shrink: 0;
      margin-left: 10px;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .draft-status.ok { background: #e8f8ef; color: #07c160; }
    .draft-status.no { background: #f5f5f5; color: #999; }

    .steps {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .steps h3 {
      font-size: 14px;
      margin: 0 0 10px 0;
    }
    .steps ol {
      margin: 0;
      padding-left: 18px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-left: 6px;
    }
    .badge.warn { background: #fff3e0; color: #ef6c00; }
    .ip-bar {
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ad6800;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ip-bar span { flex: 1; }
    .ip-bar strong { color: #d46b08; }
    .ip-bar button {
      width: auto;
      padding: 4px 10px;
      font-size: 12px;
      background: #ffa940;
      border-radius: 4px;
      margin-left: 10px;
    }
    .ip-bar button:hover { background: #fa8c16; }
    .ip-bar.error { background: #fff1f0; border-color: #ffa39e; color: #cf1322; }
  </style>
</head>
<body>
  <div class="container">
    <h1>公众号文章活码管理</h1>
    <div class="subtitle">在发布文章前，自动生成企微活码并写入“阅读原文”</div>

    <div class="ip-bar" id="ipBar">
      <span id="ipText">正在获取服务器出口 IP...</span>
      <button onclick="loadServerIp()">刷新 IP</button>
    </div>

    <!-- 草稿列表 -->
    <div class="section-title">
      <span>📋 草稿箱列表</span>
      <button class="secondary" id="refreshBtn" onclick="loadDrafts()">刷新列表</button>
    </div>
    <div class="drafts-box" id="draftsBox">
      <div class="drafts-empty">点击上方“刷新列表”加载最新草稿</div>
    </div>

    <!-- 表单 -->
    <div class="section-title">🛠️ 手动处理</div>
    <div class="form-group">
      <label>图文素材 MediaId <span class="badge warn">必填</span></label>
      <input type="text" id="mediaId" placeholder="点击上方草稿自动填充，或手动输入" />
      <div class="hint">点击草稿列表中的某一项即可自动填入</div>
    </div>

    <div class="form-group">
      <label>文章标题 <span class="badge" style="background:#f0f0f0;color:#666;">可选</span></label>
      <input type="text" id="title" placeholder="留空将自动从素材中读取" />
    </div>

    <button id="btn" onclick="handleProcess()">生成活码并更新阅读原文</button>

    <div id="result" class="result">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultBody"></div>
    </div>

    <div class="steps">
      <h3>使用步骤</h3>
      <ol>
        <li>在公众号后台写好图文素材并<b>保存到草稿箱</b></li>
        <li>回到本页面，点击<b>“刷新列表”</b>查看最新草稿</li>
        <li>点击草稿列表中的某一项，自动填充 <b>media_id</b></li>
        <li>点击<b>“生成活码并更新阅读原文”</b></li>
        <li>返回公众号后台，找到该草稿并<b>发布/群发</b></li>
        <li>发布后用户点击“阅读原文”即可跳转到企微活码</li>
      </ol>
    </div>
  </div>

  <script>
    async function loadServerIp() {
      const bar = document.getElementById('ipBar');
      const text = document.getElementById('ipText');
      text.textContent = '正在获取服务器出口 IP...';
      bar.classList.remove('error');

      try {
        const res = await fetch('/api/server-ip');
        const data = await res.json();
        if (data.success && data.ip) {
          text.innerHTML = `当前服务器出口 IP：<strong>${escapeHtml(data.ip)}</strong>，请确保该 IP 已添加到公众号后台的 IP 白名单中。`;
        } else {
          throw new Error(data.message || '未知错误');
        }
      } catch (err) {
        text.textContent = '获取 IP 失败：' + err.message;
        bar.classList.add('error');
      }
    }

    // 页面加载时自动获取 IP
    loadServerIp();

    async function loadDrafts() {
      const box = document.getElementById('draftsBox');
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = '加载中...';
      box.innerHTML = '<div class="drafts-empty">正在加载草稿...</div>';

      try {
        const res = await fetch('/api/drafts');
        const data = await res.json();

        if (!data.success || !data.data || !data.data.length) {
          box.innerHTML = '<div class="drafts-empty">暂无草稿，请先在公众号后台保存图文素材到草稿箱</div>';
          return;
        }

        box.innerHTML = '';
        data.data.forEach(draft => {
          const dateStr = draft.update_time ? new Date(draft.update_time * 1000).toLocaleString() : '';
          const statusClass = draft.has_qrcode ? 'ok' : 'no';
          const statusText = draft.has_qrcode ? '已配置活码' : '未配置活码';

          const item = document.createElement('div');
          item.className = 'draft-item';
          item.onclick = () => selectDraft(draft.media_id, draft.title);
          item.innerHTML = `
            <div class="draft-main">
              <div class="draft-title">${escapeHtml(draft.title)}</div>
              <div class="draft-meta">${escapeHtml(dateStr)} · MediaId: ${escapeHtml(draft.media_id)}</div>
            </div>
            <div class="draft-status ${statusClass}">${statusText}</div>
          `;
          box.appendChild(item);
        });
      } catch (err) {
        box.innerHTML = `<div class="drafts-empty" style="color:#d93025">加载失败：${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '刷新列表';
      }
    }

    function selectDraft(mediaId, title) {
      document.getElementById('mediaId').value = mediaId;
      document.getElementById('title').value = title || '';
      // 简单高亮一下选中的项（通过重新渲染不太优雅，这里用简单滚动）
      document.getElementById('mediaId').focus();
    }

    async function handleProcess() {
      const mediaId = document.getElementById('mediaId').value.trim();
      const title = document.getElementById('title').value.trim();
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const resultTitle = document.getElementById('resultTitle');
      const resultBody = document.getElementById('resultBody');

      if (!mediaId) {
        alert('请先选择或输入 media_id');
        return;
      }

      btn.disabled = true;
      btn.textContent = '处理中，请稍候...';
      result.className = 'result';
      resultBody.innerHTML = '';

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ media_id: mediaId, title: title || undefined })
        });
        const data = await res.json();

        if (data.success) {
          result.className = 'result success';
          resultTitle.textContent = '✅ 处理成功';
          resultBody.innerHTML = `
            <div class="result-row"><b>标题：</b>${escapeHtml(data.data.title)}</div>
            <div class="result-row"><b>MediaId：</b>${escapeHtml(data.data.media_id)}</div>
            <div class="result-row"><b>活码链接：</b><a href="${escapeHtml(data.data.qrcode_url)}" target="_blank">${escapeHtml(data.data.qrcode_url)}</a></div>
            <div class="result-row" style="margin-top:8px;color:#666;">现在可以前往公众号后台发布该素材了。</div>
          `;
          // 成功后刷新草稿列表，让状态变成“已配置”
          loadDrafts();
        } else {
          result.className = 'result error';
          resultTitle.textContent = '❌ 处理失败';
          resultBody.innerHTML = `<div class="result-row">${escapeHtml(data.message || '未知错误')}</div>`;
        }
      } catch (err) {
        result.className = 'result error';
        resultTitle.textContent = '❌ 请求失败';
        resultBody.innerHTML = `<div class="result-row">${escapeHtml(err.message)}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '生成活码并更新阅读原文';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
